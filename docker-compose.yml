services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kore
      POSTGRES_PASSWORD: kore
      POSTGRES_DB: kore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kore"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["api"]
    env_file: .env
    environment:
      KORE_POSTGRES_DSN: postgresql+asyncpg://kore:kore@db:5432/kore
      KORE_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["worker"]
    env_file: .env
    environment:
      KORE_POSTGRES_DSN: postgresql+asyncpg://kore:kore@db:5432/kore
      KORE_REDIS_URL: redis://redis:6379/0
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      replicas: 2

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["scheduler"]
    env_file: .env
    environment:
      KORE_POSTGRES_DSN: postgresql+asyncpg://kore:kore@db:5432/kore
      KORE_REDIS_URL: redis://redis:6379/0
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  # ── WhatsApp: Evolution API (puente a WhatsApp) ──────────────────────
  evolution-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 5s
      timeout: 3s
      retries: 10

  evolution:
    image: evoapicloud/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      # Clave admin: tiene que coincidir con EVOLUTION_API_KEY del backend.
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-kore-evolution-admin-key}
      SERVER_URL: http://localhost:8080
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-db:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_kore
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
    depends_on:
      evolution-db: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  pgdata:
  evolution_pgdata:
  evolution_instances:
