services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kore
      POSTGRES_PASSWORD: kore
      POSTGRES_DB: kore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kore"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["api"]
    env_file: .env
    environment:
      KORE_POSTGRES_DSN: postgresql+asyncpg://kore:kore@db:5432/kore
      KORE_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["worker"]
    env_file: .env
    environment:
      KORE_POSTGRES_DSN: postgresql+asyncpg://kore:kore@db:5432/kore
      KORE_REDIS_URL: redis://redis:6379/0
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      replicas: 2

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["scheduler"]
    env_file: .env
    environment:
      KORE_POSTGRES_DSN: postgresql+asyncpg://kore:kore@db:5432/kore
      KORE_REDIS_URL: redis://redis:6379/0
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  pgdata:
